plugins {
    id 'com.android.application'
}

android {
    namespace 'org.cochranblock.cochranblock'
    compileSdk 35

    defaultConfig {
        applicationId "org.cochranblock.cochranblock"
        minSdk 28
        targetSdk 35
        versionCode 1
        versionName "0.6.0"
    }

    signingConfigs {
        release {
            storeFile file('../cochranblock-release.jks')
            storePassword 'cochranblock2026'
            keyAlias 'cochranblock'
            keyPassword 'cochranblock2026'
        }
    }

    buildTypes {
        release {
            minifyEnabled false
            signingConfig signingConfigs.release
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }
}
