# OWNERS.yaml — cochranblock
# Ownership metadata for cochranblock.org website

project:
  name: cochranblock
  repo: github.com/cochranblock/cochranblock
  url: https://cochranblock.org
  description: "Zero-cloud website. 18MB Rust binary. $10/month infrastructure."

maintainers:
  - name: Michael Cochran
    github: cochranblock
    role: owner
    email: mcochran@cochranblock.org

subsystems:
  pages:
    path: src/web/pages.rs
    owner: cochranblock
    description: "All page HTML generation — hero, services, products, about, govdocs, codeskillz, etc."

  router:
    path: src/web/router.rs
    owner: cochranblock
    description: "Axum route definitions, middleware, compression, security headers"

  assets:
    path: src/web/assets.rs
    owner: cochranblock
    description: "Static asset serving via include_packed (zstd compressed)"

  intake:
    path: src/web/intake.rs
    owner: cochranblock
    description: "Deploy intake form — SQLite-backed submissions"

  community_grant:
    path: src/web/community_grant.rs
    owner: cochranblock
    description: "Community grant application form"

  css:
    path: assets/css/main.css
    owner: cochranblock
    description: "Cosmic theme — starfield, glassmorphism, per-page ambient color"

  js:
    path: assets/js/
    owner: cochranblock
    description: "Booking calendar, calendar widget, form handlers"

  deploy:
    path: scripts/deploy.sh
    owner: cochranblock
    description: "Full pipeline: build on lf, push to gd, purge cache, ping IndexNow"

metadata:
  created: "2026-03-16"
  updated: "2026-03-27"
  version: "2.0"
