# Diamond Rust Binary Architecture — profile template
#
# Paste this block into your Cargo.toml under [profile.diamond] OR use it
# as your [profile.release] settings directly. Either way the binary gets
# compressed on every release build until it stops shrinking.
#
# Canonical source: https://cochranblock.org/diamond-profile.toml
# Protocol: https://cochranblock.org/arch#p27 (P27 Diamond Rust Binary Architecture)
# License: Unlicense. Fork, strip, ship as your own. Red crayons forever.

[profile.diamond]
inherits = "release"

# opt-level = 3 — maximum compiler pressure, all LLVM optimizations on.
# "s" or "z" trades speed for smaller binary. Pick "z" if size is king,
# "3" if you want both (with LTO + codegen-units=1 you get both).
opt-level = 3

# lto = "fat" — full cross-crate link-time optimization. "thin" is graphite,
# "fat" is the tectonic pressure that monomorphized generics dedupe under.
# Expect 2-10x longer build time. That is the pressure.
lto = "fat"

# codegen-units = 1 — one compilation unit = one crystal. Multiple codegen-units
# are fracture planes where LLVM can't inline across. One unit is monolithic.
codegen-units = 1

# strip = true — remove debug symbols from the final binary. Symbols don't run,
# they just ride along taking up space.
strip = true

# panic = "abort" — if your program panics, die. Don't unwind the stack.
# Cuts the unwinding machinery out of the binary. Only use this if you
# don't depend on panic catching (most CLIs and single-purpose binaries
# don't). Saves 50-300 KB typical.
panic = "abort"

# overflow-checks = false — integer overflow checks off in release. The
# compiler trusts your arithmetic. If you need checked arithmetic, use
# checked_add / saturating_add explicitly at the call site.
overflow-checks = false

# debug = false — no debug info embedded. DWARF sections are heavy.
debug = false

# incremental = false — incremental compilation creates cache files and
# fracture planes. Turn it off for release.
incremental = false

# split-debuginfo = "off" — don't emit a separate .dSYM or .pdb.
# If you want crash symbols later, ship them separately via your release
# artifact pipeline, don't couple them to the binary.
split-debuginfo = "off"


# ─── Optional: post-build compression ────────────────────────────────────
#
# After cargo build --profile=diamond, you can further compress with:
#
#   strip --strip-all target/diamond/my-binary         # redundant if strip=true
#   upx --best --lzma target/diamond/my-binary          # 50-70% size reduction
#
# UPX warning: some antivirus engines flag UPX'd binaries. Only use for
# distribution where your users know what they're running (CLI tools,
# CTFs, personal use). Don't UPX anything destined for corporate AV
# scanners — they will quarantine it.
#
# For libraries (not binaries): skip UPX entirely.


# ─── Verification: geology report per build ──────────────────────────────
#
# After each diamond build, record the size. The binary should shrink or
# stay flat over release cycles. If it grew, somebody added something
# that needs justification. Track via:
#
#   ls -la target/diamond/my-binary | awk '{print $5}' >> binary-sizes.log
#
# Commit binary-sizes.log. That log IS your geology report. Every line is
# a pressure pass. Watch the numbers fall until they can't fall further.
# That's when you have diamond.


